<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Buddy v2 - Standalone</title>
    <!-- Tailwind CSS v4 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .dark { background-color: #020617; color: #e2e8f0; }
        .mermaid-container svg { width: 100% !important; height: auto !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Basic Lucide Icon Component for standalone
        const Icon = ({ name, size = 20, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current) {
                    ref.current.innerHTML = lucide.createIcons({
                        icons: { [name]: true },
                        attrs: { stroke: 'currentColor', 'stroke-width': 2, width: size, height: size }
                    });
                }
            }, [name, size]);
            return <span ref={ref} className={`inline-flex items-center justify-center ${className}`}></span>;
        };

        const App = () => {
            const [theme, setTheme] = useState('light');
            const [fontSize, setFontSize] = useState(16);
            const [activeTab, setActiveTab] = useState('scan');
            const [extractedText, setExtractedText] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [studyData, setStudyData] = useState(null);

            useEffect(() => {
                document.documentElement.className = theme;
                document.documentElement.style.fontSize = fontSize + 'px';
            }, [theme, fontSize]);

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsLoading(true);
                const { data: { text } } = await Tesseract.recognize(file, 'kor+eng');
                setExtractedText(text);
                setActiveTab('edit');
                setIsLoading(false);
            };

            return (
                <div className="min-h-screen pb-12">
                    <header className="h-16 bg-slate-900 dark:bg-slate-800 text-white flex items-center justify-between px-6 shadow-md">
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center text-slate-900 font-black">S</div>
                            <h1 className="font-bold text-lg">Study Buddy <span className="text-emerald-400 text-[10px] ml-1 uppercase">v2</span></h1>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="flex items-center gap-2 border-r border-white/10 pr-4">
                                <button onClick={() => setFontSize(f => Math.max(12, f-1))} className="p-1 hover:bg-white/10 rounded"><Icon name="Minus" size={14} /></button>
                                <span className="text-xs font-mono w-4 text-center">{fontSize}</span>
                                <button onClick={() => setFontSize(f => Math.min(32, f+1))} className="p-1 hover:bg-white/10 rounded"><Icon name="Plus" size={14} /></button>
                            </div>
                            <button onClick={() => setTheme(t => t === 'light' ? 'dark' : 'light')} className="p-2 hover:bg-white/10 rounded-full">
                                <Icon name={theme === 'light' ? 'Moon' : 'Sun'} size={18} />
                            </button>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto p-6">
                        <nav className="flex bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl mb-8 overflow-hidden shadow-sm">
                            {['scan', 'edit', 'result', 'board'].map(id => (
                                <button 
                                    key={id}
                                    onClick={() => setActiveTab(id)}
                                    className={`flex-1 py-4 text-[10px] font-bold uppercase tracking-widest transition-all border-b-2 ${activeTab === id ? 'bg-slate-50 dark:bg-slate-800 border-emerald-500 text-slate-900 dark:text-white' : 'border-transparent text-slate-400'}`}
                                >
                                    {id}
                                </button>
                            ))}
                        </nav>

                        <div className="min-h-[400px]">
                            {activeTab === 'scan' && (
                                <div className="p-12 border-2 border-dashed border-slate-300 dark:border-slate-800 rounded-2xl flex flex-col items-center justify-center bg-white dark:bg-slate-900">
                                    <Icon name="Upload" size={48} className="text-slate-300 mb-4" />
                                    <p className="text-slate-500 dark:text-slate-400 mb-8">이미지를 업로드하여 텍스트를 추출하세요.</p>
                                    <input type="file" onChange={handleFileUpload} className="hidden" id="fileIn" />
                                    <label htmlFor="fileIn" className="px-10 py-4 bg-slate-900 text-white dark:bg-emerald-500 dark:text-slate-900 rounded-lg font-bold cursor-pointer hover:opacity-90 transition-opacity">
                                        파일 선택
                                    </label>
                                </div>
                            )}

                            {activeTab === 'edit' && (
                                <div className="space-y-4">
                                    <textarea 
                                        className="w-full h-80 p-6 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl outline-none focus:border-emerald-500 transition-colors"
                                        value={extractedText}
                                        onChange={(e) => setExtractedText(e.target.value)}
                                        placeholder="이곳에 텍스트를 입력하세요..."
                                    />
                                    <button className="w-full py-4 bg-slate-900 dark:bg-emerald-500 text-white dark:text-slate-900 rounded-xl font-bold uppercase tracking-widest text-xs">AI 분석 실행 (API 연동 필요)</button>
                                </div>
                            )}

                            {activeTab === 'board' && (
                                <div className="h-[500px] bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl flex items-center justify-center">
                                    <p className="text-slate-400">화이트보드 캔버스 영역</p>
                                </div>
                            )}
                        </div>
                    </main>

                    {isLoading && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50">
                            <div className="bg-white dark:bg-slate-800 p-8 rounded-2xl shadow-2xl flex flex-col items-center">
                                <div className="w-12 h-12 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                                <p className="font-bold">분석 중...</p>
                            </div>
                        </div>
                    )}
                </div>
            )
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
